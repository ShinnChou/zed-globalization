name: 03 更新 Scoop Manifest

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release 版本号 (空则取最新)"
        required: false
        type: string
      is_prerelease:
        description: "是否为 Pre-release"
        required: false
        default: "false"
        type: string

permissions:
  contents: write

jobs:
  update-bucket:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'
    steps:
      - name: 确定目标版本号
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "手动指定版本: ${{ inputs.version_tag }}"
            echo "TARGET_TAG=${{ inputs.version_tag }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "Release 事件: ${{ github.event.release.tag_name }}"
            echo "TARGET_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
            echo "自动获取最新: $TAG"
            echo "TARGET_TAG=$TAG" >> $GITHUB_ENV
          fi

      - name: 判断是否为 Pre-release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IS_PRE="${{ inputs.is_prerelease }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            IS_PRE="${{ github.event.release.prerelease }}"
          else
            IS_PRE=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TARGET_TAG" | jq -r '.prerelease // false')
          fi
          echo "IS_PRERELEASE=$IS_PRE" >> $GITHUB_ENV
          echo "Pre-release: $IS_PRE"

      - name: 等待并获取 Windows 产物信息
        run: |
          TAG="$TARGET_TAG"
          for i in $(seq 1 20); do
            ASSETS_JSON=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
            URL_X64=$(echo "$ASSETS_JSON" | jq -r '.assets[] | select(.name | test("windows-x86_64.*\\.zip")) | .browser_download_url')
            URL_ARM64=$(echo "$ASSETS_JSON" | jq -r '.assets[] | select(.name | test("windows-aarch64.*\\.zip")) | .browser_download_url')
            if [ -n "$URL_X64" ] && [ "$URL_X64" != "null" ]; then
              echo "找到 x64 产物: $URL_X64"
              echo "ASSET_URL_X64=$URL_X64" >> $GITHUB_ENV
              [ -n "$URL_ARM64" ] && [ "$URL_ARM64" != "null" ] && echo "ASSET_URL_ARM64=$URL_ARM64" >> $GITHUB_ENV && echo "找到 arm64 产物: $URL_ARM64"
              break
            fi
            echo "[$i/20] 产物未就绪，等待 15s..."
            sleep 15
          done
          if [ -z "$URL_X64" ] || [ "$URL_X64" = "null" ]; then
            echo "::error::未找到 Windows x64 产物"
            exit 1
          fi

      - name: 下载并计算 Hash
        run: |
          curl -L -o zed-win-x64.zip "$ASSET_URL_X64"
          echo "SHA256_X64=$(sha256sum zed-win-x64.zip | awk '{print $1}')" >> $GITHUB_ENV
          rm zed-win-x64.zip

          if [ -n "$ASSET_URL_ARM64" ]; then
            curl -L -o zed-win-arm64.zip "$ASSET_URL_ARM64"
            echo "SHA256_ARM64=$(sha256sum zed-win-arm64.zip | awk '{print $1}')" >> $GITHUB_ENV
            rm zed-win-arm64.zip
          fi

      - name: 生成 Manifest
        run: |
          VERSION="$TARGET_TAG"
          CLEAN_VERSION="${VERSION#v}"
          REPO="${{ github.repository }}"

          ARM64_BLOCK=""
          ARM64_AUTOUPDATE=""
          if [ -n "$ASSET_URL_ARM64" ]; then
            ARM64_BLOCK=$(cat <<ARMBLOCK
              ,
                  "arm64": {
                      "url": "$ASSET_URL_ARM64",
                      "hash": "$SHA256_ARM64"
                  }
          ARMBLOCK
          )
            ARM64_AUTOUPDATE=$(cat <<ARMAU
              ,
                      "arm64": {
                          "url": "https://github.com/$REPO/releases/download/v\$version/zedg-zh-cn-windows-aarch64-v\$version.zip",
                          "hash": {
                              "url": "https://github.com/$REPO/releases/download/v\$version/sha256sums.txt",
                              "regex": "([a-f0-9]{64})\\s+zedg-zh-cn-windows-aarch64-v\$version\\.zip"
                          }
                      }
          ARMAU
          )
          fi

          generate_manifest() {
            local out="$1"
            local desc_suffix="${2:+ - $2}"
            cat > "$out" << MANIFEST
          {
              "version": "$CLEAN_VERSION",
              "description": "Zed Editor (Localized / 汉化版)${desc_suffix}",
              "homepage": "https://github.com/$REPO",
              "license": "GPL-3.0-only",
              "architecture": {
                  "64bit": {
                      "url": "$ASSET_URL_X64",
                      "hash": "$SHA256_X64"
                  }${ARM64_BLOCK}
              },
              "bin": "ZedG.exe",
              "shortcuts": [["ZedG.exe", "ZedG"]],
              "checkver": {
                  "github": "https://github.com/$REPO"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/$REPO/releases/download/v\$version/zedg-zh-cn-windows-x86_64-v\$version.zip",
                          "hash": {
                              "url": "https://github.com/$REPO/releases/download/v\$version/sha256sums.txt",
                              "regex": "([a-f0-9]{64})\\s+zedg-zh-cn-windows-x86_64-v\$version\\.zip"
                          }
                      }${ARM64_AUTOUPDATE}
                  }
              }
          }
          MANIFEST
          }

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "生成预览版 Manifest"
            generate_manifest "zedg-preview.json" "Preview"
          else
            echo "生成稳定版 Manifest"
            generate_manifest "zedg.json"
          fi

      - name: 推送 Manifest 到 scoop 分支
        run: |
          VERSION="$TARGET_TAG"
          CLEAN_VERSION="${VERSION#v}"

          git init /tmp/scoop-branch
          cd /tmp/scoop-branch
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          if git ls-remote --heads origin scoop | grep -q scoop; then
            git fetch origin scoop --depth 1
            git checkout scoop
          else
            git checkout -b scoop
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 清理旧包名文件（从 zed-globalization 迁移到 zedg）
          if [ -f zed-globalization.json ]; then
            git rm zed-globalization.json
          fi
          if [ -f zed-globalization-preview.json ]; then
            git rm zed-globalization-preview.json
          fi

          if [ "$IS_PRERELEASE" = "true" ]; then
            # Pre-release: 仅更新预览版
            cp $GITHUB_WORKSPACE/zedg-preview.json .
            git add zedg-preview.json
            git diff --cached --quiet || git commit -m "chore(scoop): 预览版更新到 $VERSION"
          else
            # Stable release: 更新稳定版
            cp $GITHUB_WORKSPACE/zedg.json .
            git add zedg.json

            # 如果稳定版比预览版更新，同步更新预览版
            PREVIEW_VER=""
            if [ -f zedg-preview.json ]; then
              PREVIEW_VER=$(jq -r '.version' zedg-preview.json)
            fi

            if [ -z "$PREVIEW_VER" ] || \
               [ "$(printf '%s\n' "$CLEAN_VERSION" "$PREVIEW_VER" | sort -V | tail -1)" = "$CLEAN_VERSION" ] && \
               [ "$CLEAN_VERSION" != "$PREVIEW_VER" ]; then
              echo "稳定版 ($CLEAN_VERSION) 比预览版 ($PREVIEW_VER) 更新，同步更新预览版"
              cp $GITHUB_WORKSPACE/zedg.json zedg-preview.json
              # 修正 description 字段
              jq '.description = "Zed Editor (Localized / 汉化版) - Preview"' zedg-preview.json > /tmp/preview.json
              mv /tmp/preview.json zedg-preview.json
              git add zedg-preview.json
            fi

            git diff --cached --quiet || git commit -m "chore(scoop): 更新到 $VERSION"
          fi

          git push origin scoop
